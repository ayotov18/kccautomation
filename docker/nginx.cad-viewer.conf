server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Long cache for hashed assets
    location /cad-viewer/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location /cad-viewer/ {
        try_files $uri $uri/ /cad-viewer/index.html;
    }

    location = / {
        return 404;
    }
}
